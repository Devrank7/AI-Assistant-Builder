version: '3.8'

services:
  app:
    build:
      context: .
      args:
        MONGODB_URI: ${MONGODB_URI}
        ADMIN_SECRET_TOKEN: ${ADMIN_SECRET_TOKEN}
        GEMINI_API_KEY: ${GEMINI_API_KEY}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: aiwidget
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
